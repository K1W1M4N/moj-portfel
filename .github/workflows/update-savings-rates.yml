name: Update Savings Rates

on:
  schedule:
    # Uruchamiaj 1. i 15. dnia miesiąca o 9:00 UTC (10:00/11:00 PL)
    - cron: '0 9 1,15 * *'
  workflow_dispatch: # Pozwala na ręczne uruchomienie

jobs:
  update-rates:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml
      
      - name: Run savings rates update script
        run: |
          python scripts/fetch_savings_rates.py
      
      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet src/savingsRates.js || echo "changed=true" >> $GITHUB_OUTPUT
      
      - name: Commit and push if changed
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/savingsRates.js
          git commit -m "🏦 Aktualizacja stawek kont oszczędnościowych $(date +'%Y-%m-%d')"
          git push
